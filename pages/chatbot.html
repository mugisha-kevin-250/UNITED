<!-- Chatbot Widget -->
<div id="chatbot-widget" class="fixed bottom-5 right-5 z-50">
    <!-- Chat Button -->
    <button id="chatbot-toggle" onclick="toggleChatbot()" class="bg-red-600 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg hover:bg-red-700 transition">
        <i class="fas fa-comments text-2xl"></i>
    </button>
    
    <!-- Chat Window -->
    <div id="chatbot-window" class="hidden absolute bottom-16 right-0 w-80 bg-white rounded-lg shadow-xl border border-gray-200 overflow-hidden">
        <div class="bg-red-600 text-white p-4 flex justify-between items-center">
            <h3 class="font-bold">United School Chat</h3>
            <button onclick="toggleChatbot()" class="text-white hover:text-gray-200">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <!-- Messages -->
        <div id="chatbot-messages" class="h-64 p-4 overflow-y-auto bg-gray-50">
            <div class="mb-2">
                <span class="bg-gray-200 rounded-lg px-3 py-2 inline-block">Hello! How can I help you today?</span>
            </div>
        </div>
        
        <!-- Input -->
        <div class="p-3 border-t border-gray-200">
            <form id="chatbot-form" onsubmit="sendMessage(event)" class="flex gap-2">
                <input type="text" id="chatbot-input" placeholder="Type a message..." class="flex-1 border border-gray-300 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-red-500">
                <button type="submit" class="bg-red-600 text-white rounded-full w-10 h-10 flex items-center justify-center hover:bg-red-700">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
const API_BASE = 'http://localhost:5000/api';

function toggleChatbot() {
    const window = document.getElementById('chatbot-window');
    window.classList.toggle('hidden');
}

function sendMessage(event) {
    event.preventDefault();
    const input = document.getElementById('chatbot-input');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Add user message
    const messagesDiv = document.getElementById('chatbot-messages');
    messagesDiv.innerHTML += `
        <div class="mb-2 text-right">
            <span class="bg-red-600 text-white rounded-lg px-3 py-2 inline-block">${escapeHtml(message)}</span>
        </div>
    `;
    
    // Save to MongoDB
    fetch(`${API_BASE}/contacts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: 'Website Visitor',
            message: message,
            email: 'visitor@website.com'
        })
    }).catch(err => console.log('Offline mode'));
    
    // Auto reply
    setTimeout(() => {
        const replies = [
            "Thank you for your message! We'll get back to you soon.",
            "Our team will respond to your inquiry shortly.",
            "For immediate assistance, please call +250 788 863 500",
            "You can also visit our admissions page for more information."
        ];
        const randomReply = replies[Math.floor(Math.random() * replies.length)];
        
        messagesDiv.innerHTML += `
            <div class="mb-2">
                <span class="bg-gray-200 rounded-lg px-3 py-2 inline-block">${randomReply}</span>
            </div>
        `;
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, 1000);
    
    input.value = '';
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
