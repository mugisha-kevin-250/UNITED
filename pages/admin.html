<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - United Nursery and Primary School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-graduation-cap text-2xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Admin Portal</h1>
                <p class="text-gray-400">United Nursery and Primary School</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-gray-300 mb-2">Username</label>
                    <input type="text" id="username" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:border-red-500 focus:outline-none" placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-gray-300 mb-2">Password</label>
                    <input type="password" id="password" class="w-full bg-gray-700 border border-gray-600 text-white rounded-lg px-4 py-3 focus:border-red-500 focus:outline-none" placeholder="Enter password">
                </div>
                <button type="submit" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 transition">
                    Login
                </button>
            </form>
            <p class="text-center text-gray-500 text-sm mt-4">Default: admin / admin123</p>
            <p id="error-msg" class="text-center text-red-500 text-sm mt-2 hidden">Invalid credentials</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="hidden">
        <!-- Header -->
        <header class="bg-gray-800 shadow-lg border-b border-gray-700">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white">Admin Portal</h1>
                        <p class="text-xs text-gray-400">United Nursery & Primary School</p>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-300">Welcome, Admin</span>
                    <button onclick="logout()" class="text-red-500 hover:text-red-400">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            </div>
        </header>

        <!-- Content -->
        <div class="container mx-auto px-4 py-8">
            <!-- Navigation -->
            <div class="flex flex-wrap gap-4 mb-8">
                <button onclick="showSection('news')" class="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-red-600 transition">
                    <i class="fas fa-newspaper mr-2"></i>News
                </button>
                <button onclick="showSection('admissions')" class="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-red-600 transition">
                    <i class="fas fa-user-graduate mr-2"></i>Admissions
                </button>
                <button onclick="showSection('contacts')" class="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-red-600 transition">
                    <i class="fas fa-envelope mr-2"></i>Messages
                </button>
                <button onclick="showSection('gallery')" class="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-red-600 transition">
                    <i class="fas fa-images mr-2"></i>Gallery
                </button>
            </div>

            <!-- News Section -->
            <div id="section-news">
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-2xl font-bold text-white mb-6">Manage News</h2>
                    
                    <!-- Add News Form -->
                    <div class="mb-8 p-4 bg-gray-700 rounded-lg">
                        <h3 class="text-white font-bold mb-4">Add New Article</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-300 mb-1">Title</label>
                                <input type="text" id="news-title" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2" placeholder="Enter news title">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-1">Category</label>
                                <select id="news-category" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2">
                                    <option value="Events">Events</option>
                                    <option value="Announcements">Announcements</option>
                                    <option value="Academic">Academic</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-1">Image (URL or upload)</label>
                                <input type="file" id="news-image-file" accept="image/*" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2 mb-2">
                                <input type="text" id="news-image-url" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2" placeholder="Or enter image URL">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-1">Content</label>
                                <textarea id="news-content" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2" rows="4" placeholder="Enter news content"></textarea>
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-1">Notify Subscribers via Email</label>
                                <label class="flex items-center text-gray-300">
                                    <input type="checkbox" id="news-send-email" class="mr-2">
                                    Send email notification when published
                                </label>
                            </div>
                            <button onclick="addNews()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Publish News</button>
                        </div>
                    </div>

                    <!-- News List -->
                    <div id="news-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Admissions Section -->
            <div id="section-admissions" class="hidden">
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-2xl font-bold text-white mb-6">Student Admissions</h2>
                    
                    <!-- Stats -->
                    <div class="grid grid-cols-3 gap-4 mb-6">
                        <div class="bg-gray-700 p-4 rounded-lg">
                            <p class="text-gray-400">Pending</p>
                            <p id="pending-count" class="text-2xl font-bold text-yellow-500">0</p>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg">
                            <p class="text-gray-400">Approved</p>
                            <p id="approved-count" class="text-2xl font-bold text-green-500">0</p>
                        </div>
                        <div class="bg-gray-700 p-4 rounded-lg">
                            <p class="text-gray-400">Rejected</p>
                            <p id="rejected-count" class="text-2xl font-bold text-red-500">0</p>
                        </div>
                    </div>

                    <!-- Admissions List -->
                    <div id="admissions-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Contacts/Messages Section -->
            <div id="section-contacts" class="hidden">
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-2xl font-bold text-white mb-6">Contact Messages</h2>
                    
                    <!-- Contacts List -->
                    <div id="contacts-list" class="space-y-4"></div>
                </div>
            </div>

            <!-- Gallery Section -->
            <div id="section-gallery" class="hidden">
                <div class="bg-gray-800 rounded-xl p-6 border border-gray-700">
                    <h2 class="text-2xl font-bold text-white mb-6">Manage Gallery</h2>
                    
                    <!-- Add Image Form -->
                    <div class="mb-8 p-4 bg-gray-700 rounded-lg">
                        <h3 class="text-white font-bold mb-4">Add New Image</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-300 mb-1">Image URL</label>
                                <input type="text" id="image-url" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2" placeholder="Enter image URL">
                            </div>
                            <div>
                                <label class="block text-gray-300 mb-1">Caption</label>
                                <input type="text" id="image-caption" class="w-full bg-gray-600 border border-gray-500 text-white rounded px-3 py-2" placeholder="Enter caption">
                            </div>
                            <button onclick="addImage()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Add Image</button>
                        </div>
                    </div>

                    <!-- Image Grid -->
                    <div id="gallery-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize data from localStorage
        let newsData = JSON.parse(localStorage.getItem('school_news') || '[]');
        let admissionsData = JSON.parse(localStorage.getItem('schoolApplications') || '[]');
        let contactsData = JSON.parse(localStorage.getItem('contacts') || '[]');
        let galleryData = JSON.parse(localStorage.getItem('gallery') || '[]');

        // Login Handler
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === 'admin123') {
                localStorage.setItem('adminToken', 'demo-token');
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                renderAll();
            } else {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        });

        function logout() {
            localStorage.removeItem('adminToken');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
        }

        // Check if already logged in
        if (localStorage.getItem('adminToken')) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            renderAll();
        }

        function renderAll() {
            renderNews();
            renderAdmissions();
            renderContacts();
            renderGallery();
        }

        // Show section
        function showSection(section) {
            document.getElementById('section-news').classList.add('hidden');
            document.getElementById('section-admissions').classList.add('hidden');
            document.getElementById('section-contacts').classList.add('hidden');
            document.getElementById('section-gallery').classList.add('hidden');
            document.getElementById('section-' + section).classList.remove('hidden');
        }

        // ==================== NEWS ====================
        // Image to base64 conversion
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
                reader.readAsDataURL(file);
            });
        }

        // Email notification function (simulated)
        async function sendEmailNotification(newsTitle, newsContent) {
            // In production, this would call a backend API to send emails
            console.log('Email notification sent for:', newsTitle);
            alert(`Email notification sent to subscribers about: "${newsTitle}"`);
        }

        async function addNews() {
            const title = document.getElementById('news-title').value;
            const category = document.getElementById('news-category').value;
            const content = document.getElementById('news-content').value;
            const sendEmail = document.getElementById('news-send-email').checked;
            
            // Get image - either from file upload or URL
            let imageUrl = document.getElementById('news-image-url').value;
            const imageFile = document.getElementById('news-image-file').files[0];
            
            if (!title || !content) {
                alert('Please fill in all required fields');
                return;
            }

            // Handle image upload
            if (imageFile) {
                try {
                    imageUrl = await imageToBase64(imageFile);
                } catch (e) {
                    console.error('Error converting image:', e);
                    alert('Error processing image');
                    return;
                }
            }

            const news = {
                id: Date.now(),
                title,
                category,
                content,
                image: imageUrl || null,
                date: new Date().toLocaleDateString(),
                createdAt: new Date().toISOString()
            };

            newsData.unshift(news);
            localStorage.setItem('school_news', JSON.stringify(newsData));
            
            document.getElementById('news-title').value = '';
            document.getElementById('news-content').value = '';
            document.getElementById('news-image-url').value = '';
            document.getElementById('news-image-file').value = '';
            
            renderNews();
            
            if (sendEmail) {
                sendEmailNotification(title, content);
            } else {
                alert('News published!');
            }
        }

        function renderNews() {
            const container = document.getElementById('news-list');
            if (newsData.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No news articles yet</p>';
                return;
            }
            container.innerHTML = newsData.map(news => `
                <div class="bg-gray-700 p-4 rounded-lg flex justify-between items-start">
                    <div class="flex gap-4">
                        ${news.image ? `<img src="${news.image}" class="w-20 h-20 object-cover rounded" alt="News image">` : ''}
                        <div>
                            <h4 class="text-white font-bold">${news.title}</h4>
                            <p class="text-gray-400 text-sm">${news.category} • ${news.date}</p>
                            <p class="text-gray-300 mt-2">${news.content.substring(0, 100)}...</p>
                        </div>
                    </div>
                    <button onclick="deleteNews(${news.id})" class="text-red-500 hover:text-red-400">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }

        function deleteNews(id) {
            if (confirm('Delete this news?')) {
                newsData = newsData.filter(n => n.id !== id);
                localStorage.setItem('school_news', JSON.stringify(newsData));
                renderNews();
            }
        }

        // ==================== ADMISSIONS ====================
        function renderAdmissions() {
            const pending = admissionsData.filter(a => a.status === 'pending').length;
            const approved = admissionsData.filter(a => a.status === 'approved').length;
            const rejected = admissionsData.filter(a => a.status === 'rejected').length;
            
            document.getElementById('pending-count').textContent = pending;
            document.getElementById('approved-count').textContent = approved;
            document.getElementById('rejected-count').textContent = rejected;

            const container = document.getElementById('admissions-list');
            if (admissionsData.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No admissions yet</p>';
                return;
            }
            
            container.innerHTML = admissionsData.map(admission => `
                <div class="bg-gray-700 p-4 rounded-lg">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-white font-bold">${admission.studentName || 'N/A'}</h4>
                            <p class="text-gray-400 text-sm">Grade: ${admission.grade || 'N/A'} | Parent: ${admission.parentName || 'N/A'}</p>
                            <p class="text-gray-400 text-sm">Email: ${admission.parentEmail || admission.email || 'N/A'} | Phone: ${admission.parentPhone || admission.phone || 'N/A'}</p>
                            <p class="text-gray-400 text-sm">Applied: ${admission.date || new Date(admission.createdAt).toLocaleDateString() || 'N/A'}</p>
                            <p class="text-gray-300 mt-2">${admission.message || ''}</p>
                        </div>
                        <div class="flex gap-2">
                            ${admission.status === 'pending' ? `
                                <button onclick="approveAdmission('${admission.applicationId || admission.id}')" class="bg-green-600 text-white px-3 py-1 rounded hover:bg-green-700">
                                    <i class="fas fa-check"></i> Approve
                                </button>
                                <button onclick="rejectAdmission('${admission.applicationId || admission.id}')" class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">
                                    <i class="fas fa-times"></i> Reject
                                </button>
                            ` : `
                                <span class="px-3 py-1 rounded ${admission.status === 'approved' ? 'bg-green-600' : 'bg-red-600'} text-white">
                                    ${admission.status.toUpperCase()}
                                </span>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function approveAdmission(appId) {
            const admission = admissionsData.find(a => (a.applicationId || a.id) == appId);
            if (admission) {
                admission.status = 'approved';
                admission.adminNotes = 'Congratulations! Your child has been admitted.';
                localStorage.setItem('schoolApplications', JSON.stringify(admissionsData));
                renderAdmissions();
                alert(`Admission approved! Email sent to ${admission.parentEmail || admission.email}`);
            }
        }

        function rejectAdmission(appId) {
            const admission = admissionsData.find(a => (a.applicationId || a.id) == appId);
            if (admission) {
                admission.status = 'rejected';
                admission.adminNotes = 'Unfortunately, your application was not approved at this time.';
                localStorage.setItem('schoolApplications', JSON.stringify(admissionsData));
                renderAdmissions();
                alert(`Admission rejected. Email sent to ${admission.parentEmail || admission.email}`);
            }
        }

        // ==================== CONTACTS ====================
        function renderContacts() {
            const container = document.getElementById('contacts-list');
            if (contactsData.length === 0) {
                container.innerHTML = '<p class="text-gray-400">No messages yet</p>';
                return;
            }
            
            container.innerHTML = contactsData.map(contact => `
                <div class="bg-gray-700 p-4 rounded-lg">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="text-white font-bold">${contact.name}</h4>
                            <p class="text-gray-400 text-sm">Email: ${contact.email}</p>
                            <p class="text-gray-400 text-sm">Phone: ${contact.phone || 'N/A'}</p>
                            <p class="text-gray-300 mt-2">${contact.message}</p>
                            <p class="text-gray-500 text-xs mt-2">${contact.date || ''}</p>
                        </div>
                        <div class="flex gap-2">
                            <a href="mailto:${contact.email}" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">
                                <i class="fas fa-reply"></i> Reply
                            </a>
                            <button onclick="deleteContact(${contact.id})" class="text-red-500 hover:text-red-400">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteContact(id) {
            if (confirm('Delete this message?')) {
                contactsData = contactsData.filter(c => c.id !== id);
                localStorage.setItem('contacts', JSON.stringify(contactsData));
                renderContacts();
            }
        }

        // ==================== GALLERY ====================
        function addImage() {
            const url = document.getElementById('image-url').value;
            const caption = document.getElementById('image-caption').value;

            if (!url) {
                alert('Please enter image URL');
                return;
            }

            const image = {
                id: Date.now(),
                url,
                caption
            };

            galleryData.unshift(image);
            localStorage.setItem('gallery', JSON.stringify(galleryData));
            
            document.getElementById('image-url').value = '';
            document.getElementById('image-caption').value = '';
            
            renderGallery();
            alert('Image added!');
        }

        function renderGallery() {
            const container = document.getElementById('gallery-list');
            container.innerHTML = galleryData.map(img => `
                <div class="bg-gray-700 rounded-lg overflow-hidden">
                    <img src="${img.url}" alt="${img.caption}" class="w-full h-32 object-cover">
                    <div class="p-2 flex justify-between items-center">
                        <p class="text-white text-sm">${img.caption}</p>
                        <button onclick="deleteImage(${img.id})" class="text-red-500 hover:text-red-400">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteImage(id) {
            if (confirm('Delete this image?')) {
                galleryData = galleryData.filter(i => i.id !== id);
                localStorage.setItem('gallery', JSON.stringify(galleryData));
                renderGallery();
            }
        }
    </script>
</body>
</html>
