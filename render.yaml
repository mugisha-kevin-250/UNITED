# Static Site Configuration
sites:
  - type: web
    name: UNITED
    buildCommand: # No build command needed for static HTML
    publishDirectory: pages
    env: static

# Backend Web Service Configuration  
services:
  - type: web
    name: school-backend
    env: node
    buildCommand: cd united && npm install
    startCommand: cd united && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGO_URI
        # IMPORTANT: Set your MongoDB Atlas URI in Render dashboard env vars
        # Format: mongodb+srv://<username>:<password>@<cluster>.mongodb.net/<database>?options
      - key: JWT_SECRET
        value: united-school-jwt-secret-2024
